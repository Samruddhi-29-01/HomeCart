<!DOCTYPE html>
<html>
<head>
  <title>Login - HomeKart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="announcement-bar">Member access unlocks saved carts, faster checkout, and order tracking.</div>
  <header>
    <nav>
      <a href="index.html" class="logo">🛋️ HomeKart</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="auth-hero">
      <div class="container auth-hero-content">
        <p class="hero-kicker">Welcome Back</p>
        <h1>Sign In to Continue Shopping</h1>
        <p>Access your saved items, premium deals, and seamless checkout in one place.</p>
      </div>
    </section>
    <div class="form-container">
      <h2>Login to Your Account</h2>
      <div class="form-group">
        <input id="email" type="email" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input id="password" type="password" placeholder="Password" required>
      </div>
      <button onclick="login()" class="btn">Login</button>
    </div>
  </main>

  <script>
  function login() {
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const button = document.querySelector(".btn");

    // Clear previous errors
    clearErrors();

    // Basic validation
    if (!email.value || !password.value) {
      showError("Please fill in all fields");
      return;
    }

    if (!isValidEmail(email.value)) {
      showError("Please enter a valid email address");
      return;
    }

    // Show loading state
    button.textContent = "Logging in...";
    button.disabled = true;

    fetch('/login', {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: email.value,
        password: password.value
      })
    })
    .then(async res => {
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.message || "Login failed");
      }
      return data;
    })
    .then(data => {
      if (data.token) {
        localStorage.setItem("token", data.token);
        if (data.user) {
          localStorage.setItem("currentUser", JSON.stringify(data.user));
        }
        showNotification("Login successful! Redirecting...", "success");
        setTimeout(() => {
          location = "index.html";
        }, 1500);
      } else {
        throw new Error(data.message || "Login failed");
      }
    })
    .catch(error => {
      showError(error.message || "Login failed. Please try again.");
      button.textContent = "Login";
      button.disabled = false;
    });
  }

  function showError(message) {
    const errorDiv = document.createElement("div");
    errorDiv.className = "error-message";
    errorDiv.textContent = message;
    document.querySelector(".form-container").prepend(errorDiv);
  }

  function clearErrors() {
    const errors = document.querySelectorAll(".error-message");
    errors.forEach(error => error.remove());
  }

  function isValidEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
  }

  function showNotification(message, type) {
    const notification = document.createElement("div");
    notification.className = `notification ${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.remove();
    }, 3000);
  }

  // Add enter key support
  document.addEventListener('DOMContentLoaded', function() {
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
  });
  </script>
  <script src="auth-ui.js"></script>
</body>
</html>
