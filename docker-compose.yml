services:
  app:
    build: .
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
    networks:
      - homekart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  homekart-network:
    driver: bridge