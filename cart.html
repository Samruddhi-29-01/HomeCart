<!DOCTYPE html>
<html>
<head>
  <title>Your Cart - HomeKart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">🛋️ HomeKart</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Your Shopping Cart</h2>
    <div id="cart"></div>
  </main>

  <script>
  let cartData = [];

  function loadCart() {
    fetch('/cart', {
      headers: {
        Authorization: localStorage.getItem("token")
      }
    })
    .then(res => res.json())
    .then(data => {
      cartData = data;
      renderCart();
    })
    .catch(error => {
      console.error('Error loading cart:', error);
      document.getElementById("cart").innerHTML = "<p class='error'>Failed to load cart. Please try again.</p>";
    });
  }

  function renderCart() {
    const cartElement = document.getElementById("cart");

    if (cartData.length === 0) {
      cartElement.innerHTML = `
        <div class="empty-cart">
          <h3>Your cart is empty</h3>
          <p>Add some products to get started!</p>
          <a href="index.html" class="btn btn-secondary">Continue Shopping</a>
        </div>
      `;
      return;
    }

    let out = "<div class='cart-items'>";
    let total = 0;

    cartData.forEach((item, index) => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;

      out += `
        <div class="cart-item">
          <div class="item-info">
            <h4>${item.productId}</h4>
            <p class="price">₹${item.price} each</p>
          </div>
          <div class="quantity-controls">
            <button onclick="updateCartQuantity(${index}, -1)" class="qty-btn">-</button>
            <span class="quantity">${item.quantity}</span>
            <button onclick="updateCartQuantity(${index}, 1)" class="qty-btn">+</button>
          </div>
          <div class="item-total">
            <p class="price">₹${itemTotal}</p>
            <button onclick="removeFromCart(${index})" class="btn btn-secondary remove-btn">Remove</button>
          </div>
        </div>
      `;
    });

    out += "</div>";
    out += `
      <div class="cart-summary">
        <div class="total">
          <h3>Total: ₹${total}</h3>
        </div>
        <div class="cart-actions">
          <a href="index.html" class="btn btn-secondary">Continue Shopping</a>
          <button onclick="checkout()" class="btn">Proceed to Checkout</button>
        </div>
      </div>
    `;

    cartElement.innerHTML = out;
  }

  function updateCartQuantity(index, change) {
    const item = cartData[index];
    const newQuantity = Math.max(1, item.quantity + change);

    if (newQuantity !== item.quantity) {
      // Update on server
      fetch('/cart', {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": localStorage.getItem("token")
        },
        body: JSON.stringify({
          productId: item.productId,
          quantity: newQuantity
        })
      })
      .then(res => {
        if (res.ok) {
          item.quantity = newQuantity;
          renderCart();
          showNotification("Cart updated!", "success");
        } else {
          throw new Error('Failed to update cart');
        }
      })
      .catch(error => {
        console.error('Error updating cart:', error);
        showNotification("Failed to update cart", "error");
      });
    }
  }

  function removeFromCart(index) {
    const item = cartData[index];

    fetch('/cart', {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
        "Authorization": localStorage.getItem("token")
      },
      body: JSON.stringify({
        productId: item.productId
      })
    })
    .then(res => {
      if (res.ok) {
        cartData.splice(index, 1);
        renderCart();
        showNotification("Item removed from cart!", "success");
      } else {
        throw new Error('Failed to remove item');
      }
    })
    .catch(error => {
      console.error('Error removing item:', error);
      showNotification("Failed to remove item", "error");
    });
  }

  function checkout() {
    // Placeholder for checkout functionality
    showNotification("Checkout functionality coming soon!", "success");
  }

  function showNotification(message, type) {
    const notification = document.createElement("div");
    notification.className = `notification ${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.remove();
    }, 3000);
  }

  // Load cart on page load
  loadCart();
  </script>
</body>
</html>
